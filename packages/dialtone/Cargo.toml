[package]
name = "dialtone"
version = "0.0.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { workspace = true, default-features = false, features = ["napi10", "async"] }
napi-derive = { workspace = true }

zenoh = { workspace = true, features = ["unstable", "internal"] }
zenoh-ext = { workspace = true, features = ["unstable"] }

[build-dependencies]
napi-build = { workspace = true }
