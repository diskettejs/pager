[package]
name = "zenoh-node"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3", default-features = false, features = ["napi10"] }
napi-derive = "3"
zenoh = "1.9.0"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
strip = "symbols"
